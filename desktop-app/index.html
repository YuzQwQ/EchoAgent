<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 放宽 CSP 限制：允许 WebSocket, CDN 脚本, 以及 Live2D 需要的 unsafe-eval -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cubism.live2d.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com ws: data: blob: filesystem:;">
    <title>Echo Desktop</title>
    <!-- 引入 PixiJS 和 Live2D 插件 (本地化) -->
    <script src="assets/libs/pixi.min.js"></script>
    <script src="assets/libs/live2dcubismcore.min.js"></script>
    <script src="assets/libs/live2d.min.js"></script>
    <script src="assets/libs/pixi-live2d-display.min.js"></script>
    <script src="assets/libs/wav-recorder.js"></script>
    
    <!-- 调试标记：远程加载确认 -->
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* 透明背景 */
            overflow: hidden; /* 禁止滚动 */
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 拖拽区域覆盖全屏，但在交互元素上禁用拖拽 */
        #drag-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            -webkit-app-region: drag; /* 允许拖拽窗口 */
            z-index: 10;
        }

        #live2d-container {
            position: absolute;
            bottom: 60px; /* 上移: 0 -> 60px，让人物整体上浮 */
            left: 50%;
            transform: translateX(-50%);
            width: 100%; 
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 0; /* 在最底层 */
            pointer-events: none; /* 让鼠标事件穿透 Canvas */
        }
        
        #live2d-canvas {
            /* 只有模型部分需要响应点击（需要在 JS 里做点击检测，或者简单点全屏穿透，只留控制栏） */
            /* 为了简单，我们让 canvas 不拦截，靠上层 drag-overlay 拖拽 */
            /* 如果要点击人物互动，需要把 drag-overlay 设为 no-drag 并在人物区域响应 */
        }

        /* 字幕条样式 (替代气泡) */
        #subtitle-bar {
            position: absolute;
            bottom: 60px; /* 下移: 80px -> 60px，紧贴控制栏 */
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(245, 246, 250, 0.90)); /* 稍微增加不透明度 */
            padding: 14px 20px; /* 增加内边距 */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(20, 24, 40, 0.15);
            width: 90%; /* 加宽: 86% -> 90% */
            max-width: 420px; /* 加宽: 380px -> 420px */
            min-height: 44px;
            
            /* 字体优化 */
            /* 使用幼圆体，保持圆润可爱 */
            font-family: 'Comic Sans MS', 'YouYuan', 'Microsoft YaHei', sans-serif;
            font-size: 20px; 
            font-weight: 600; /* 稍微加粗一点点，幼圆细了不好看 */
            letter-spacing: 0.5px;
            
            line-height: 1.4;
            color: #2c3e50; /* 加深颜色提高对比度 */
            text-shadow: 0 1px 1px rgba(255,255,255,0.8); /* 增加文字立体感 */
            
            border: 2px solid rgba(255, 255, 255, 0.5); /* 增加白色边框 */
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: auto;
            -webkit-app-region: no-drag;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(14px) saturate(140%); /* 毛玻璃效果 */
        }
        
        #subtitle-bar.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        #subtitle-bar.hide {
            opacity: 0;
            transform: translateX(-50%) translateY(20px); /* 向下隐藏 */
            pointer-events: none;
        }

        /* 隐藏原来的聊天界面 */
        #chat-section {
            display: none;
        }

        /* 简易控制栏 (鼠标悬停显示) */
        #control-panel {
            position: absolute;
            bottom: 10px; /* 下移: 20px -> 10px */
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            display: flex;
            gap: 8px;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s ease;
            -webkit-app-region: no-drag;
            background: rgba(255,255,255,0.55);
            padding: 6px 12px;
            border-radius: 999px;
            box-shadow: 0 10px 25px rgba(20, 24, 40, 0.12);
            border: 1px solid rgba(140, 150, 170, 0.18);
            backdrop-filter: blur(16px) saturate(150%);
        }

        body:hover #control-panel {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .icon-btn {
            background: rgba(255,255,255,0.8);
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: #ffffff;
            box-shadow: 0 8px 16px rgba(20, 24, 40, 0.14);
            transform: translateY(-1px);
        }
        
        .icon-btn.active {
            color: #ff4444; /* 激活状态颜色 */
            background: rgba(255, 68, 68, 0.15);
        }
        
        /* 观察模式呼吸灯动画 */
        @keyframes breathe {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 10px 5px rgba(255, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }
        
        #observer-btn.active {
            animation: breathe 2s infinite;
            color: #ff4444;
        }
        
        /* 输入框浮层 */
        #input-overlay {
            position: absolute;
            bottom: 50px; /* 下移: 70px -> 50px */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(255,255,255,0.6);
            padding: 8px 10px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(20, 24, 40, 0.12);
            border: 1px solid rgba(140, 150, 170, 0.18);
            backdrop-filter: blur(16px) saturate(150%);
            z-index: 40;
            display: none; /* 默认隐藏 */
            -webkit-app-region: no-drag;
        }
        
        #input-overlay.show {
            display: flex;
            gap: 5px;
        }

        #mini-input {
            flex: 1;
            border: 1px solid rgba(140, 150, 170, 0.25);
            padding: 10px 12px;
            border-radius: 10px;
            outline: none;
            background: rgba(255,255,255,0.95);
            color: #1e2532;
            font-size: 16px; /* 放大输入字体 */
            font-weight: 500;
        }
        
        #mini-send-btn {
            width: 32px;
            height: 32px;
        }
    </style>
</head>
<body>

    <!-- 拖拽层 (用于拖动窗口) -->
    <div id="drag-overlay"></div>

    <!-- 调试光标 (默认隐藏，JS中控制) -->
    <div id="debug-cursor" style="position: absolute; width: 10px; height: 10px; background: red; border-radius: 50%; pointer-events: none; z-index: 9999; display: none; transform: translate(-50%, -50%);"></div>

    <!-- Live2D 层 -->
    <div id="live2d-container">
        <canvas id="live2d-canvas"></canvas>
    </div>

    <!-- 字幕条 -->
    <div id="subtitle-bar" class="hide">
        Echo 准备就绪...
    </div>

    <!-- 简易控制栏 -->
    <div id="control-panel">
        <button class="icon-btn" id="toggle-input-btn" title="输入文字">⌨️</button>
        <button class="icon-btn" id="mic-btn" title="按住说话">🎤</button>
        <button class="icon-btn" id="observer-btn" title="观察模式 (Observer Mode)">👁️</button>
        <button class="icon-btn" id="motion-btn" title="动作演示">🎬</button>
        <button class="icon-btn" id="tts-btn" title="开启/关闭语音">🔇</button>
        <button class="icon-btn" id="settings-btn" title="设置">⚙️</button>
        <button class="icon-btn" id="close-btn" title="退出" style="color: #ff4444;">✕</button>
        <!-- 隐藏图片按钮，保持简洁 -->
        <input type="file" id="image-upload" accept="image/*" style="display: none;">
        <button class="icon-btn" id="img-btn" title="发送图片" style="display:none">📷</button>
    </div>

    <!-- 输入框浮层 -->
    <div id="input-overlay">
        <input type="text" id="mini-input" placeholder="和 Echo 聊聊...">
        <button class="icon-btn" id="mini-send-btn">➤</button>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,255,255,0.95); padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100; -webkit-app-region: no-drag; min-width: 250px;">
        <h3 style="margin-top: 0; color: #333;">设置</h3>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; color: #555;">后端地址 (Server IP):</label>
            <input type="text" id="server-ip-input" placeholder="127.0.0.1:18000" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; color: #555;">观察模式 (Observer Mode):</label>
            <select id="observer-mode-select" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
                <option value="general">通用模式 (General)</option>
                <option value="terraria">泰拉瑞亚 (Terraria)</option>
            </select>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button id="cancel-settings-btn" style="padding: 6px 12px; border: none; background: #eee; border-radius: 6px; cursor: pointer;">取消</button>
            <button id="save-settings-btn" style="padding: 6px 12px; border: none; background: #007bff; color: white; border-radius: 6px; cursor: pointer;">保存并重启</button>
        </div>
    </div>

    <!-- 动作演示面板 -->
    <!-- 移除内嵌面板 -->

    <!-- 隐藏的原有结构 (保留以维持 JS 变量引用，或者稍后修改 JS) -->
    <div id="chat-section" style="display: none;">
        <div id="chat-container"></div>
        <div id="input-area">
            <textarea id="message-input"></textarea>
            <button id="send-btn"></button>
        </div>
    </div>

<script>
    // 映射新 UI 元素
    const bubble = document.getElementById('bubble');
    const inputOverlay = document.getElementById('input-overlay');
    const toggleInputBtn = document.getElementById('toggle-input-btn');
    const observerBtn = document.getElementById('observer-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const serverIpInput = document.getElementById('server-ip-input');
    const observerModeSelect = document.getElementById('observer-mode-select');
    const saveSettingsBtn = document.getElementById('save-settings-btn');
    const cancelSettingsBtn = document.getElementById('cancel-settings-btn');
    const miniInput = document.getElementById('mini-input');
    const miniSendBtn = document.getElementById('mini-send-btn');
    
    // 配置加载
    // 如果是通过 HTTP 加载的，优先使用当前 URL 的 Host 作为 Server IP
    // 这样就不用手动改 localStorage 了
    let defaultAddress = '127.0.0.1:18000';
    if (location.protocol.startsWith('http')) {
        defaultAddress = location.host;
    }
    let serverIp = localStorage.getItem('server_ip') || defaultAddress;
    let observerMode = localStorage.getItem('observer_mode') || 'general';
    function normalizeServerAddress(value) {
        const raw = (value || '').trim();
        if (!raw) {
            return { host: '127.0.0.1', port: 18000 };
        }
        let v = raw.replace(/^https?:\/\//i, '').replace(/^wss?:\/\//i, '');
        v = v.replace(/\s+/g, ':');
        v = v.split('/')[0];
        let host = v;
        let port = 18000;
        if (v.includes(':')) {
            const parts = v.split(':');
            host = parts[0] || '127.0.0.1';
            const parsed = Number(parts[1]);
            port = Number.isFinite(parsed) && parsed > 0 ? parsed : 18000;
        } else {
            const ipv4WithPort = v.match(/^(\d+\.\d+\.\d+\.\d+)(\d{2,5})$/);
            if (ipv4WithPort) {
                host = ipv4WithPort[1];
                const parsed = Number(ipv4WithPort[2]);
                port = Number.isFinite(parsed) && parsed > 0 ? parsed : 18000;
            }
        }
        return { host: host || '127.0.0.1', port };
    }
    
    // 设置按钮逻辑
    settingsBtn.addEventListener('click', () => {
        serverIpInput.value = serverIp;
        if (observerModeSelect) observerModeSelect.value = observerMode;
        settingsModal.style.display = 'block';
    });
    
    cancelSettingsBtn.addEventListener('click', () => {
        settingsModal.style.display = 'none';
    });
    
    saveSettingsBtn.addEventListener('click', () => {
        const newIp = serverIpInput.value.trim();
        const newMode = observerModeSelect ? observerModeSelect.value : 'general';
        
        if (newIp) {
            localStorage.setItem('server_ip', newIp);
            localStorage.setItem('observer_mode', newMode);
            observerMode = newMode;
            
            alert('设置已保存。');
            settingsModal.style.display = 'none';
            
            // 如果 IP 变了才刷新，否则只是保存配置
            if (newIp !== serverIp) {
                 location.reload();
            }
        }
    });

    // 原始变量重新映射 (为了兼容下面的旧代码)
    const chatContainer = document.getElementById('chat-container'); // 依然保留，防止报错，但不可见
    // const messageInput = document.getElementById('message-input'); // 下面会重新获取
    // const sendBtn = document.getElementById('send-btn'); // 下面会重新获取
    
    // UI 交互逻辑
    toggleInputBtn.addEventListener('click', () => {
        if (inputOverlay.style.display === 'flex') {
            inputOverlay.style.display = 'none';
            inputOverlay.classList.remove('show');
        } else {
            inputOverlay.style.display = 'flex';
            inputOverlay.classList.add('show');
            miniInput.focus();
        }
    });

    // 观察模式逻辑
    const { ipcRenderer } = require('electron');
    let isObserverActive = false;
    let observerTimer = null;
    let observerStream = null;
    let observerVideo = null;
    let observerAnalysisCanvas = null;
    let observerAnalysisCtx = null;
    let observerFrameCanvas = null;
    let observerFrameCtx = null;
    let observerPrevGray = null;
    let observerStableCount = 0;
    let observerIdleCount = 0;
    let observerEventActive = false;
    let observerEventEnd = 0;
    let observerBestFrame = null;
    let observerBestChange = 0;
    let observerLastSendTime = 0;
    let observerPendingFrame = null;
    let observerPendingEventType = "";
    let observerLastEventType = "";
    let observerLastEventTime = 0;
    let observerSustainedStart = 0;
    let observerEventType = "";
    let observerNextIntervalMs = 100;

    const OBSERVER_ANALYSIS_WIDTH = 160;
    const OBSERVER_ANALYSIS_HEIGHT = 90;
    const OBSERVER_ACTIVE_INTERVAL_MS = 100;
    const OBSERVER_IDLE_INTERVAL_MS = 250;
    const OBSERVER_PIXEL_DIFF_THRESHOLD = 25;
    const OBSERVER_CHANGE_LIGHT = 0.003;
    const OBSERVER_CHANGE_MEDIUM = 0.01;
    const OBSERVER_CHANGE_STRONG = 0.03;
    const OBSERVER_STABLE_FRAMES = 2;
    const OBSERVER_IDLE_FRAMES = 6;
    const OBSERVER_EVENT_WINDOW_MS = 800;
    const OBSERVER_MIN_INTERVAL_MS = 2500;
    const OBSERVER_STRONG_MIN_INTERVAL_MS = 800;
    const OBSERVER_DEBOUNCE_MS = 1500;
    const OBSERVER_MAX_WAIT_MS = 6000;
    const OBSERVER_SEND_MAX_WIDTH = 1280;
    const OBSERVER_SEND_MAX_HEIGHT = 720;
    const OBSERVER_SEND_QUALITY = 0.7;

    observerBtn.addEventListener('click', () => {
        isObserverActive = !isObserverActive;
        if (isObserverActive) {
            observerBtn.classList.add('active');
            startObserverLoop();
            showSubtitle('Echo 正在观察你的屏幕...', 3000);
        } else {
            observerBtn.classList.remove('active');
            stopObserverLoop();
            showSubtitle('观察模式已关闭', 3000);
        }
    });

    function startObserverLoop() {
        initObserverCapture()
            .then(() => scheduleObserverAnalysis(0))
            .catch((e) => {
                console.error("Screen capture failed:", e);
                showSubtitle('截图失败: ' + e.message, 3000);
                isObserverActive = false;
                observerBtn.classList.remove('active');
                stopObserverLoop();
            });
    }

    function stopObserverLoop() {
        if (observerTimer) {
            clearTimeout(observerTimer);
            observerTimer = null;
        }
        if (observerStream) {
            observerStream.getTracks().forEach(track => track.stop());
        }
        observerStream = null;
        observerVideo = null;
        observerAnalysisCanvas = null;
        observerAnalysisCtx = null;
        observerFrameCanvas = null;
        observerFrameCtx = null;
        observerPrevGray = null;
        observerStableCount = 0;
        observerIdleCount = 0;
        observerEventActive = false;
        observerEventEnd = 0;
        observerBestFrame = null;
        observerBestChange = 0;
        observerPendingFrame = null;
        observerPendingEventType = "";
        observerSustainedStart = 0;
        observerEventType = "";
    }

    async function initObserverCapture() {
        if (!isConnected) return;
        if (observerStream) return;
        const sourceId = await ipcRenderer.invoke('get-screen-source-id');
        if (!sourceId) throw new Error("No screen source found");

        observerStream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
                mandatory: {
                    chromeMediaSource: 'desktop',
                    chromeMediaSourceId: sourceId,
                    maxWidth: 1920,
                    maxHeight: 1080
                }
            }
        });

        observerVideo = document.createElement('video');
        observerVideo.srcObject = observerStream;

        await new Promise((resolve) => {
            observerVideo.onloadedmetadata = () => {
                observerVideo.play();
                resolve();
            };
        });

        observerAnalysisCanvas = document.createElement('canvas');
        observerAnalysisCanvas.width = OBSERVER_ANALYSIS_WIDTH;
        observerAnalysisCanvas.height = OBSERVER_ANALYSIS_HEIGHT;
        observerAnalysisCtx = observerAnalysisCanvas.getContext('2d');
        observerFrameCanvas = document.createElement('canvas');
        observerFrameCtx = observerFrameCanvas.getContext('2d');
        observerPrevGray = null;
        observerStableCount = 0;
        observerIdleCount = 0;
        observerEventActive = false;
        observerBestFrame = null;
        observerBestChange = 0;
        observerPendingFrame = null;
        observerPendingEventType = "";
        observerSustainedStart = 0;
        observerEventType = "";
        observerNextIntervalMs = OBSERVER_ACTIVE_INTERVAL_MS;
    }

    function scheduleObserverAnalysis(delayMs) {
        if (!isObserverActive) return;
        if (observerTimer) clearTimeout(observerTimer);
        observerTimer = setTimeout(observerAnalyzeFrame, delayMs);
    }

    function observerAnalyzeFrame() {
        if (!isObserverActive || !observerVideo || !observerAnalysisCtx) return;
        if (observerVideo.readyState < 2) {
            scheduleObserverAnalysis(OBSERVER_ACTIVE_INTERVAL_MS);
            return;
        }

        observerAnalysisCtx.drawImage(observerVideo, 0, 0, OBSERVER_ANALYSIS_WIDTH, OBSERVER_ANALYSIS_HEIGHT);
        const imageData = observerAnalysisCtx.getImageData(0, 0, OBSERVER_ANALYSIS_WIDTH, OBSERVER_ANALYSIS_HEIGHT);
        const data = imageData.data;
        const totalPixels = OBSERVER_ANALYSIS_WIDTH * OBSERVER_ANALYSIS_HEIGHT;
        let prev = observerPrevGray;
        if (!prev || prev.length !== totalPixels) {
            prev = new Uint8Array(totalPixels);
        }
        let changed = 0;
        let index = 0;
        for (let i = 0; i < data.length; i += 4) {
            const gray = (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114) | 0;
            const diff = Math.abs(gray - prev[index]);
            if (diff > OBSERVER_PIXEL_DIFF_THRESHOLD) {
                changed += 1;
            }
            prev[index] = gray;
            index += 1;
        }
        observerPrevGray = prev;
        const changeRatio = changed / totalPixels;
        const changeLevel = getObserverChangeLevel(changeRatio);
        const now = performance.now();

        if (observerPendingFrame) {
            const pendingMinInterval = observerPendingEventType === "strong" ? OBSERVER_STRONG_MIN_INTERVAL_MS : OBSERVER_MIN_INTERVAL_MS;
            const pendingDebounced = observerPendingEventType === observerLastEventType && now - observerLastEventTime < OBSERVER_DEBOUNCE_MS;
            if (now - observerLastSendTime >= pendingMinInterval && !pendingDebounced) {
                sendObserverFrame(observerPendingFrame, observerPendingEventType);
                observerPendingFrame = null;
                observerPendingEventType = "";
            }
        }

        if (changeLevel === "idle") {
            observerStableCount = 0;
            observerIdleCount += 1;
        } else {
            observerIdleCount = 0;
            observerStableCount = Math.min(observerStableCount + 1, OBSERVER_STABLE_FRAMES);
        }

        if (observerIdleCount >= OBSERVER_IDLE_FRAMES && !observerEventActive) {
            observerNextIntervalMs = OBSERVER_IDLE_INTERVAL_MS;
        } else {
            observerNextIntervalMs = OBSERVER_ACTIVE_INTERVAL_MS;
        }

        if (changeLevel !== "idle") {
            if (!observerSustainedStart) observerSustainedStart = now;
        } else {
            observerSustainedStart = 0;
        }

        if (!observerEventActive && observerStableCount >= OBSERVER_STABLE_FRAMES && (changeLevel === "medium" || changeLevel === "strong")) {
            observerEventActive = true;
            observerEventEnd = now + OBSERVER_EVENT_WINDOW_MS;
            observerBestFrame = null;
            observerBestChange = 0;
            observerEventType = changeLevel;
        }
        if (changeLevel === "strong" && !observerEventActive && observerStableCount >= 1) {
            const frame = captureObserverFrame();
            attemptSendObserverFrame(frame, "strong");
            observerStableCount = 0;
            observerSustainedStart = 0;
        }

        if (observerEventActive) {
            if (changeRatio > observerBestChange) {
                observerBestChange = changeRatio;
                observerBestFrame = captureObserverFrame();
            }
            if (now >= observerEventEnd || (changeLevel === "strong" && observerBestChange >= OBSERVER_CHANGE_STRONG)) {
                observerEventActive = false;
                observerStableCount = 0;
                if (observerBestFrame) {
                    attemptSendObserverFrame(observerBestFrame, observerEventType);
                }
                observerBestFrame = null;
                observerBestChange = 0;
            }
        }

        if (!observerEventActive && observerSustainedStart && now - observerSustainedStart >= OBSERVER_MAX_WAIT_MS) {
            const frame = captureObserverFrame();
            attemptSendObserverFrame(frame, "medium");
            observerSustainedStart = now;
        }

        scheduleObserverAnalysis(observerNextIntervalMs);
    }

    function getObserverChangeLevel(changeRatio) {
        if (changeRatio >= OBSERVER_CHANGE_STRONG) return "strong";
        if (changeRatio >= OBSERVER_CHANGE_MEDIUM) return "medium";
        if (changeRatio >= OBSERVER_CHANGE_LIGHT) return "light";
        return "idle";
    }

    function captureObserverFrame() {
        if (!observerVideo || !observerFrameCanvas || !observerFrameCtx) return null;
        const width = observerVideo.videoWidth || 1920;
        const height = observerVideo.videoHeight || 1080;
        const scale = Math.min(1, OBSERVER_SEND_MAX_WIDTH / width, OBSERVER_SEND_MAX_HEIGHT / height);
        const targetWidth = Math.max(1, Math.round(width * scale));
        const targetHeight = Math.max(1, Math.round(height * scale));
        observerFrameCanvas.width = targetWidth;
        observerFrameCanvas.height = targetHeight;
        observerFrameCtx.drawImage(observerVideo, 0, 0, targetWidth, targetHeight);
        return observerFrameCanvas.toDataURL('image/jpeg', OBSERVER_SEND_QUALITY);
    }

    function attemptSendObserverFrame(dataUrl, eventType) {
        if (!dataUrl) return;
        const now = performance.now();
        const minInterval = eventType === "strong" ? OBSERVER_STRONG_MIN_INTERVAL_MS : OBSERVER_MIN_INTERVAL_MS;
        const debounced = eventType === observerLastEventType && now - observerLastEventTime < OBSERVER_DEBOUNCE_MS;
        if (now - observerLastSendTime < minInterval || debounced) {
            observerPendingFrame = dataUrl;
            observerPendingEventType = eventType;
            return;
        }
        sendObserverFrame(dataUrl, eventType);
    }

    function sendObserverFrame(dataUrl, eventType) {
        if (!isConnected || !ws || ws.readyState !== 1) return;
        observerLastSendTime = performance.now();
        observerLastEventType = eventType;
        observerLastEventTime = observerLastSendTime;
        ws.send(JSON.stringify({

    class Typewriter {
        constructor() {
            this.queue = [];
            this.isTyping = false;
            this.currentText = "";
            this.typingSpeed = 50; // ms per char
            this.timer = null;
        }

        append(text) {
            for (let char of text) {
                // [Fix] 如果当前没有文字且队列为空，忽略开头的空白字符
                if (this.currentText === "" && this.queue.length === 0 && char.trim() === "") {
                    continue;
                }
                this.queue.push(char);
            }
            if (!this.isTyping) {
                this.processQueue();
            }
        }

        processQueue() {
            if (this.queue.length === 0) {
                this.isTyping = false;
                
                // [Added] 打字结束后，启动自动隐藏计时器
                // 根据当前文本长度计算阅读时间，读完后隐藏
                // 基础 3秒 + 每字 0.15秒
                const readDuration = 3000 + this.currentText.length * 150;
                this.setHideTimeout(readDuration);
                
                return;
            }

            this.isTyping = true;
            
            // 确保显示
            subtitleBar.classList.remove('hide');
            subtitleBar.classList.add('show');
            if (subtitleTimer) clearTimeout(subtitleTimer); // 清除自动隐藏

            const char = this.queue.shift();
            this.currentText += char;
            subtitleBar.innerText = this.currentText;

            // 动态延迟：标点符号稍微停顿
            let delay = this.typingSpeed;
            if (['，', ',', '。', '.', '！', '!', '？', '?', '；', ';', '、'].includes(char)) {
                delay = 200;
            }

            this.timer = setTimeout(() => this.processQueue(), delay);
        }

        clear() {
            this.queue = [];
            this.currentText = "";
            this.isTyping = false;
            subtitleBar.innerText = "";
            if (this.timer) clearTimeout(this.timer);
        }
        
        // 设置一个延时隐藏，会被新的输入或语音播放打断
        setHideTimeout(duration) {
             if (subtitleTimer) clearTimeout(subtitleTimer);
             subtitleTimer = setTimeout(() => {
                 subtitleBar.classList.remove('show');
                 subtitleBar.classList.add('hide');
             }, duration);
        }
    }

    function triggerMotion(emotion) {
        if (!live2dModel) return;
        console.log(`Triggering emotion: ${emotion}`);
        
        let candidates = [];
        
        // Hiyori 动作精确映射 (Group + Index)
        // m01(Idle:0) 点头
        // m02(Idle:1) 好奇/惊讶
        // m03(Flick:0) 摇摆/害羞/开心
        // m04(FlickDown:0) 难过/低头
        // m05(Idle:2) 微笑
        // m06(FlickUp:0) 举手/开心
        // m07(Tap:0) 惊讶震动
        // m08(Tap:1) 双手举高/非常开心
        // m09(Tap@Body:0) 惊讶后不开心/生气
        // m10(Flick@Body:0) 极度难过

        switch (emotion) {
            case 'happy': 
                candidates = [
                    {g: 'FlickUp', i: 0}, // m06
                    {g: 'Tap', i: 1},     // m08
                    {g: 'Flick', i: 0}    // m03
                ];
                break; 
            case 'sad': 
                candidates = [
                    {g: 'FlickDown', i: 0},   // m04
                    {g: 'Flick@Body', i: 0}   // m10
                ];
                break;
            case 'angry': 
            case 'serious':
                candidates = [{g: 'Tap@Body', i: 0}]; // m09
                break; 
            case 'surprised': 
                candidates = [
                    {g: 'Tap', i: 0},  // m07
                    {g: 'Idle', i: 1}  // m02
                ];
                break;
            case 'shy': 
                candidates = [{g: 'Flick', i: 0}]; // m03
                break;
            case 'relaxed': 
            case 'idle':
            default: 
                candidates = [
                    {g: 'Idle', i: 0}, // m01
                    {g: 'Idle', i: 2}  // m05
                ];
        }
        
        if (candidates.length > 0) {
            const c = candidates[Math.floor(Math.random() * candidates.length)];
            // Priority 3 (FORCE) 确保打断当前动作
            live2dModel.internalModel.motionManager.startMotion(c.g, c.i, 3);
            console.log(`Playing emotion motion: ${emotion} -> ${c.g}_${c.i}`);
        }
    }

    function connectWebSocket() {
        // 连接本地 FastAPI 服务
        const { host, port } = normalizeServerAddress(serverIp);
        ws = new WebSocket(`ws://${host}:${port}/ws/chat`);
        
        // 情感标签解析缓冲
        let textBuffer = "";

        ws.onopen = () => {
            console.log('Connected to Echo API');
            isConnected = true;
            appendSystemMessage('Echo 已上线！！');
            sendBtn.disabled = false;
        };

        ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'user_input') {
                    // 显示识别到的用户语音内容
                    showSubtitle(`🎤 ${data.content}`, true);
                } else if (data.type === 'chunk') {
                    if (!currentEchoMessageDiv) {
                        currentEchoMessageDiv = true; // 标记正在接收
                        // 新消息开始
                        textBuffer = "";
                        
                        // 清空并显示字幕条
                        subtitleTypewriter.clear(); 
                        showSubtitle("", false);

                        // 重置音频播放序号
                        nextSequenceId = 0;
                        audioBufferQueue = [];
                        isPlayingAudio = false;
                    }

                    // --- 流式解析情绪标签 ---
                    textBuffer += data.content;
                    
                    // 循环处理所有完整的标签
                    // 匹配 [emotion: happy] 或 [emotion:sad] 等，支持宽松匹配（空格、连字符等）
                    const tagRegex = /\[emotion:\s*([^[\]]+?)\]/i;
                    
                    while (true) {
                        const match = textBuffer.match(tagRegex);
                        if (!match) break;
                        
                        const [fullTag, rawEmotion] = match;
                        const emotion = rawEmotion.trim(); // 去除可能的首尾空格
                        const tagIndex = match.index;
                        
                        // 显示标签前的内容
                        const contentBefore = textBuffer.substring(0, tagIndex);
                        if (contentBefore) {
                            subtitleTypewriter.append(contentBefore);
                        }
                        
                        // 触发动作
                        triggerMotion(emotion);
                        
                        // 移除已处理部分 (包括标签本身)
                        textBuffer = textBuffer.substring(tagIndex + fullTag.length);
                    }
                    
                    // 处理剩余 Buffer (检查是否有半个标签)
                    // 如果 buffer 结尾是 [ 或 [emo... 这种可能组成标签的前缀，则暂存
                    let safeEndIndex = textBuffer.length;
                    const lastOpen = textBuffer.lastIndexOf('[');
                    
                    if (lastOpen >= 0) {
                        const tail = textBuffer.substring(lastOpen);
                        const target = "[emotion:";
                        // 如果尾部可能是标签的前缀 (互为前缀)
                        if (target.startsWith(tail) || tail.startsWith(target)) {
                            safeEndIndex = lastOpen;
                        }
                    }
                    
                    const contentToFlush = textBuffer.substring(0, safeEndIndex);
                    textBuffer = textBuffer.substring(safeEndIndex); // 保留剩余部分
                    
                    if (contentToFlush) {
                        subtitleTypewriter.append(contentToFlush);
                    }
                    
                } else if (data.type === 'audio_stream') {
                    // 新的流式 TTS 处理
                    handleAudioStream(data);
                } else if (data.type === 'audio') {
                    // 兼容旧的音频数据 (base64)
                    queueAudio(data.content);
                } else if (data.type === 'done') {
                    // 冲刷剩余 buffer
                    if (textBuffer) {
                        subtitleTypewriter.append(textBuffer);
                        textBuffer = "";
                    }
                    
                    currentEchoMessageDiv = null;
                    // 对话结束
                    // 如果没有开启 TTS (isPlayingAudio 为 false 且 队列为空)，则直接倒计时隐藏
                    // 如果开启了 TTS，隐藏逻辑交给 tryPlayNext 的 onended 处理
                    if (!isPlayingAudio && audioBufferQueue.length === 0) {
                        subtitleTypewriter.setHideTimeout(3000);
                    }

                } else if (data.type === 'error') {
                    showSubtitle(`Error: ${data.content}`, true);
                    currentEchoMessageDiv = null;
                }
            };

        ws.onclose = () => {
            console.log('Disconnected');
            isConnected = false;
            appendSystemMessage('与 Echo 断开连接，正在尝试重连...');
            sendBtn.disabled = true;
            setTimeout(connectWebSocket, 3000);
        };

        ws.onerror = (err) => {
            console.error('WebSocket Error:', err);
            // appendSystemMessage('连接发生错误');
        };
    }

    // 语音播放相关
    let audioContext = null; // 复用 AudioContext
    let nextSequenceId = 0; // 期望播放的下一段音频序号
    let audioBufferQueue = []; // 音频缓冲队列 (按序存储)
    
    // 初始化 AudioContext (必须在用户交互后)
    function initAudioContext() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // 处理流式音频
    function handleAudioStream(data) {
        const { sequence_id, content } = data;
        
        // 1. 将数据存入队列
        audioBufferQueue.push({
            id: sequence_id,
            content: content
        });
        
        // 2. 排序 (防止网络乱序)
        audioBufferQueue.sort((a, b) => a.id - b.id);
        
        // 3. 尝试播放
        tryPlayNext();
    }
    
    // 尝试播放下一段
    function tryPlayNext() {
        if (isPlayingAudio) return; // 正在播，别插嘴
        if (audioBufferQueue.length === 0) return; // 没货了
        
        // 检查队首是否是我们期望的下一段
        const nextItem = audioBufferQueue[0];
        if (nextItem.id !== nextSequenceId) {
            console.log(`Waiting for sequence ${nextSequenceId}, but got ${nextItem.id}`);
            return; // 还没等到，继续等
        }
        
        // 取出并播放
        audioBufferQueue.shift();
        playAudioStream(nextItem.content);
    }
    
    function playAudioStream(base64Data) {
        isPlayingAudio = true;
        initAudioContext();
        
        const audioData = base64ToArrayBuffer(base64Data);
        
        audioContext.decodeAudioData(audioData, (buffer) => {
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            
            // 口型同步: 这里的简单实现是用音量驱动，或者直接随机动
            // 为了简化，我们假设每播放一段音频，就做随机口型
            startLipSync(buffer.duration);

            source.onended = () => {
                isPlayingAudio = false;
                stopLipSync();
                nextSequenceId++; // 准备播下一段
                tryPlayNext(); // 尝试无缝衔接
            };
            
            source.start(0);
        }, (e) => {
            console.error("Error decoding audio data", e);
            isPlayingAudio = false;
            stopLipSync();
            nextSequenceId++;
            tryPlayNext();
        });
    }

    // 简单的口型同步 (基于时间)
    let currentLipSyncTimer = null;

    function startLipSync(duration) {
        if (!live2dModel) return;
        
        // 先清理旧的
        stopLipSync();

        const startTime = Date.now();
        const durationMs = duration * 1000;
        
        currentLipSyncTimer = setInterval(() => {
            const elapsed = Date.now() - startTime;
            if (elapsed >= durationMs) {
                stopLipSync();
                return;
            }
            
            // 随机张嘴 0.0 ~ 0.8
            const value = Math.random() * 0.8; 
            if (live2dModel && live2dModel.internalModel) {
                live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', value);
            }
            
        }, 100); // 每100ms更新一次
    }

    function stopLipSync() {
        if (currentLipSyncTimer) {
            clearInterval(currentLipSyncTimer);
            currentLipSyncTimer = null;
        }
        if (live2dModel && live2dModel.internalModel) {
            live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', 0);
        }
    }

    function base64ToArrayBuffer(base64) {
        const binaryString = window.atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    // 兼容旧版 playAudio (非流式)
    function playAudio(base64Data) {
        const audio = new Audio("data:audio/wav;base64," + base64Data);
        audio.play();
        
        // 简单的口型同步 (仅针对旧版)
        if (live2dModel) {
             audio.onplay = () => {
                 // 简单模拟: 播放期间随机张嘴
                 const interval = setInterval(() => {
                     if (audio.paused) {
                         clearInterval(interval);
                         live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', 0);
                     } else {
                         live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', Math.random());
                     }
                 }, 100);
             };
        }
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !isConnected) return;

        // 重置音频播放状态，打断之前的播放
        resetAudioState();

        // 1. 显示用户消息 (在气泡中短暂显示)
        showSubtitle(`我: ${text}`, true);

        // 2. 发送给后端
        ws.send(JSON.stringify({
            type: 'text',
            content: text,
            role: 'user' 
        }));

        messageInput.value = '';
        
        // 隐藏输入浮层 (如果是 mini input)
        inputOverlay.style.display = 'none';
        inputOverlay.classList.remove('show');
    }

    function createMessageDiv(role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        return div;
    }
    
    function appendSystemMessage(text) {
        showSubtitle(`[系统]: ${text}`, true);
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // --- 音频流处理逻辑 ---
    
    function resetAudioState() {
        // 停止当前播放（如果可能）
        if (isPlayingAudio) {
            // 这里很难直接停止正在播放的 Audio 对象，除非我们全局持有它
            // 但我们可以清空队列，这样当前这段播完就不会播下一段了
            // 也可以调用 stopLipSync
            stopLipSync();
        }
        audioBufferQueue = [];
        nextSequenceId = 0;
        isPlayingAudio = false;
    }

    function handleAudioStream(data) {
        const { sequence_id, content } = data;
        // 放入缓冲区
        audioBufferQueue.push({id: sequence_id, content: content});
        // 排序：按 sequence_id 从小到大
        audioBufferQueue.sort((a, b) => a.id - b.id);
        
        // 尝试播放
        tryPlayNext();
    }

    function tryPlayNext() {
        if (isPlayingAudio) return; // 正在播放中，等待 ended 事件触发下一次
        
        if (audioBufferQueue.length === 0) {
            // 队列空了
            // 检查是否对话已结束 (currentEchoMessageDiv 在 done 时被置为 null)
            if (!currentEchoMessageDiv) {
                 // 对话已结束，且音频已播完，延迟 3 秒后隐藏字幕
                 subtitleTypewriter.setHideTimeout(3000); 
            }
            return; 
        }

        // 检查队首是否是我们期待的下一段
        const nextItem = audioBufferQueue[0];
        if (nextItem.id !== nextSequenceId) {
            console.log(`Waiting for sequence ${nextSequenceId}, but got ${nextItem.id} (buffered: ${audioBufferQueue.length})`);
            return;
        }

        // 取出并播放
        audioBufferQueue.shift();
        nextSequenceId++; // 期待下一段
        playAudioStream(nextItem.content);
    }

    function playAudioStream(base64Data) {
        isPlayingAudio = true;
        const audio = new Audio("data:audio/wav;base64," + base64Data); // 注意：GPT-SoVITS 通常返回 wav 或 mp3，这里假设 wav 兼容性更好
        
        audio.onended = () => {
            isPlayingAudio = false;
            stopLipSync();
            // 简单策略：直接播放下一段，无 Crossfade
            tryPlayNext();
        };
        
        audio.onerror = (e) => {
            console.error("Audio playback error", e);
            isPlayingAudio = false;
            stopLipSync();
            tryPlayNext(); // 容错：跳过错误的，尝试下一段
        };
        
        audio.play().then(() => {
            startLipSync(audio);
        }).catch(e => {
            console.error("Auto-play prevented", e);
            isPlayingAudio = false;
            tryPlayNext();
        });
    }

    // 旧的音频播放队列逻辑 (保留以兼容 audio 类型)
    function queueAudio(base64Data) {
        // 将其视为 sequence_id = 0 的流
        resetAudioState();
        handleAudioStream({ sequence_id: 0, content: base64Data });
    }



    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    // 回车发送 (Shift+Enter 换行)
    messageInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    // 图片上传处理
    imgBtn.addEventListener('click', () => imageUpload.click());

    imageUpload.addEventListener('change', function(e) {
        if (this.files && this.files[0]) {
            sendImage(this.files[0]);
            this.value = ''; // 重置，允许重复上传同一张
        }
    });

    function sendImage(file) {
        if (!isConnected) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            
            // 1. 显示图片消息
            showSubtitle("📷 [发送了一张图片]", true);
            
            // 2. 发送给后端
            ws.send(JSON.stringify({
                type: 'image',
                content: base64Data
            }));
        };
        reader.readAsDataURL(file);
    }

    // 拖拽支持 (已禁用，防止误触)
    /*
    document.body.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
    });

    document.body.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            const file = e.dataTransfer.files[0];
            if (file.type.startsWith('image/')) {
                sendImage(file);
            }
        }
    });
    */

    // 退出按钮
    document.getElementById('close-btn').addEventListener('click', () => {
        if (confirm('确定要让 Echo 休息一下吗？')) {
            window.close(); // Electron 环境下会关闭窗口
        }
    });

    // 启动连接
    connectWebSocket();

</script>

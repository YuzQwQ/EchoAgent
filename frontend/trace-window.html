<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Trace Log</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #070b14;
            --panel: #0d1424;
            --line: rgba(255, 255, 255, 0.09);
            --text: #eef2ff;
            --soft: rgba(238, 242, 255, 0.62);
            --accent: #8ff0c8;
            --error: #ff8ea0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--line);
            background: rgba(13, 20, 36, 0.96);
        }

        .title {
            display: grid;
            gap: 2px;
        }

        .title strong {
            font-size: 14px;
        }

        .title span {
            color: var(--soft);
            font-size: 12px;
        }

        .actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button,
        label {
            min-height: 32px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
        }

        input {
            margin: 0;
        }

        #trace-list {
            min-height: 0;
            overflow-y: auto;
            padding: 10px 12px;
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
            background: var(--panel);
        }

        .trace-empty {
            padding: 24px;
            color: var(--soft);
            text-align: center;
            font-size: 13px;
        }

        .trace-row {
            display: grid;
            grid-template-columns: auto auto auto minmax(0, 1fr);
            gap: 8px;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(238, 242, 255, 0.84);
            font-size: 11px;
            line-height: 1.45;
        }

        .trace-row.error {
            color: #ffd0d6;
        }

        .trace-row.debug {
            color: rgba(238, 242, 255, 0.52);
        }

        .trace-time {
            color: rgba(238, 242, 255, 0.45);
        }

        .trace-level {
            min-width: 42px;
            color: #9fb6ff;
            text-transform: uppercase;
        }

        .trace-row.error .trace-level {
            color: var(--error);
        }

        .trace-event {
            color: var(--accent);
            font-weight: 700;
        }

        .trace-detail,
        .trace-preview,
        .trace-message {
            overflow-wrap: anywhere;
        }

        .trace-detail,
        .trace-preview {
            grid-column: 4;
            color: var(--soft);
        }

        .trace-preview {
            padding-left: 8px;
            border-left: 2px solid rgba(143, 240, 200, 0.24);
        }
    </style>
</head>
<body>
    <header class="toolbar">
        <div class="title">
            <strong>Echo Trace Log</strong>
            <span>Detached runtime events</span>
        </div>
        <div class="actions">
            <label title="Show debug events">
                <input id="debug-toggle" type="checkbox">
                <span>Debug</span>
            </label>
            <button id="copy-btn" type="button">Copy</button>
            <button id="clear-btn" type="button">Clear</button>
        </div>
    </header>
    <main id="trace-list"></main>
    <script src="js/ui/trace-window.js"></script>
</body>
</html>

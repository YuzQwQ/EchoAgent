<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cubism.live2d.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com ws: data: blob: filesystem:; script-src 'self' 'unsafe-eval' https://cubism.live2d.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' data: https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' ws: wss: http: https:;">
    <title>Echo Desktop</title>

    <script src="assets/libs/pixi.min.js"></script>
    <script src="assets/libs/live2dcubismcore.min.js"></script>
    <script src="assets/libs/live2d.min.js"></script>
    <script src="assets/libs/pixi-live2d-display.min.js"></script>
    <script src="assets/libs/wav-recorder.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/controls.css">
    <link rel="stylesheet" href="styles/subtitle.css">
    <link rel="stylesheet" href="styles/modal.css">
    <link rel="stylesheet" href="styles/states.css">
</head>
<body class="echo-app">
    <div id="drag-overlay" aria-hidden="true"></div>
    <div id="debug-cursor" aria-hidden="true"></div>

    <main id="app-shell" class="app-shell">
        <!-- Live2D 主舞台 -->
        <section id="stage-shell" class="stage-shell">
            <div id="live2d-container" class="stage-canvas-wrap">
                <canvas id="live2d-canvas"></canvas>
            </div>

            <!-- 顶部状态层 -->
            <header id="hud-layer" class="hud-layer">

                <!-- 字幕 -->
                <div id="subtitle-bar" class="glass-card subtitle-bar hide">
                    Echo 准备就绪...
                </div>

                <!-- 快捷输入 -->
                <div id="input-overlay" class="glass-panel input-overlay input-group input-group-lg">
                    <input
                        type="text"
                        id="mini-input"
                        class="form-control"
                        placeholder="和 Echo 聊聊..."
                        autocomplete="off"
                    >
                    <button class="btn btn-primary" id="mini-send-btn" title="发送" aria-label="发送消息">
                        <i class="bi bi-send"></i>
                    </button>
                </div>

                <!-- 右下控制面板 -->
                <nav id="control-panel" class="glass-panel control-panel" aria-label="快捷控制面板">
                    <button class="icon-btn" id="toggle-input-btn" title="输入文字" aria-label="输入文字">
                        <i class="bi bi-keyboard"></i>
                    </button>
                    <button class="icon-btn" id="mic-btn" title="按住说话" aria-label="语音输入">
                        <i class="bi bi-mic"></i>
                    </button>
                    <button class="icon-btn" id="observer-btn" title="观察模式 (Observer Mode)" aria-label="观察模式">
                        <i class="bi bi-eye"></i>
                    </button>
                    <button class="icon-btn" id="motion-btn" title="动作演示" aria-label="动作演示">
                        <i class="bi bi-camera-reels"></i>
                    </button>
                    <button class="icon-btn" id="tts-btn" title="开启/关闭语音" aria-label="切换语音">
                        <i class="bi bi-volume-mute"></i>
                    </button>
                    <button class="icon-btn" id="settings-btn" title="设置" aria-label="打开设置">
                        <i class="bi bi-gear"></i>
                    </button>
                    <button class="icon-btn danger" id="close-btn" title="退出" aria-label="退出应用">
                        <i class="bi bi-x-lg"></i>
                    </button>

                    <input type="file" id="image-upload" accept="image/*" hidden>
                    <button class="icon-btn" id="img-btn" title="发送图片" aria-label="发送图片">
                        <i class="bi bi-image"></i>
                    </button>
                </nav>
            </header>
        </section>

        <!-- 侧边聊天区 -->
        <aside id="chat-section" class="glass-panel chat-shell">
            <div class="chat-header">
                <div>
                    <h2 class="chat-title mb-0">Echo</h2>
                    <p class="chat-subtitle mb-0">Observer-first Desktop Agent</p>
                </div>
            </div>

            <div id="chat-container" class="chat-container"></div>

            <div id="input-area" class="chat-input-area input-group">
                <textarea
                    id="message-input"
                    class="form-control"
                    placeholder="输入消息..."
                    rows="2"
                ></textarea>
                <button id="send-btn" class="btn btn-primary" aria-label="发送消息">
                    <i class="bi bi-send"></i>
                </button>
            </div>
        </aside>
    </main>

    <!-- 设置弹窗 -->
    <div id="settings-backdrop" class="modal-backdrop-custom" style="display: none;"></div>

    <section
        id="settings-modal"
        class="settings-modal glass-modal"
        style="display: none;"
        aria-labelledby="settings-title"
        aria-modal="true"
        role="dialog"
        tabindex="-1"
    >
        <div class="settings-header">
            <div class="settings-heading">
                <span class="settings-icon" aria-hidden="true">
                    <i class="bi bi-sliders2"></i>
                </span>
                <div>
                    <h3 id="settings-title" class="settings-title">设置</h3>
                    <p class="settings-subtitle">连接、观察模式与访问令牌</p>
                </div>
            </div>
            <button id="cancel-settings-btn" class="settings-close-btn" type="button" title="关闭" aria-label="关闭设置">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">
                <i class="bi bi-folder2-open" aria-hidden="true"></i>
                <span>工作目录</span>
            </div>
            <div class="settings-field">
                <label for="workspace-root-input" class="form-label">本地工具目录</label>
                <div class="settings-path-row">
                    <input
                        type="text"
                        id="workspace-root-input"
                        class="settings-input form-control form-control-sm"
                        placeholder="D:\Echo Workspace"
                    >
                    <button id="select-workspace-dir-btn" class="settings-icon-btn" type="button" title="选择目录" aria-label="选择工作目录">
                        <i class="bi bi-folder2-open"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">
                <i class="bi bi-hdd-network" aria-hidden="true"></i>
                <span>连接</span>
            </div>
            <div class="settings-field">
                <label for="server-ip-input" class="form-label">后端地址</label>
                <input
                    type="text"
                    id="server-ip-input"
                    class="settings-input form-control form-control-sm"
                    placeholder="https://echo.example.com"
                >
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">
                <i class="bi bi-eye" aria-hidden="true"></i>
                <span>行为</span>
            </div>
            <div class="settings-field">
                <label for="observer-mode-select" class="form-label">观察模式</label>
                <select id="observer-mode-select" class="settings-select form-select form-select-sm">
                    <option value="general">通用模式 (General)</option>
                    <option value="terraria">泰拉瑞亚 (Terraria)</option>
                </select>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">
                <i class="bi bi-shield-lock" aria-hidden="true"></i>
                <span>权限</span>
            </div>
            <div class="settings-field">
                <label for="access-token-input" class="form-label">Access Token</label>
                <div class="settings-token-row">
                    <input
                        type="password"
                        id="access-token-input"
                        class="settings-input form-control form-control-sm"
                        placeholder="用于聊天与 WebSocket 连接"
                    >
                    <button id="toggle-token-visibility-btn" class="settings-icon-btn" type="button" title="显示/隐藏令牌" aria-label="显示或隐藏 Access Token">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
        </div>

        <section id="admin-panel-info" class="settings-details">
            <div>
                <div class="settings-section-title">
                    <i class="bi bi-window-sidebar" aria-hidden="true"></i>
                    <span>模型管理</span>
                </div>
                <div class="settings-hint">
                    运行时模型配置和管理令牌已经迁移到独立的 Admin 页面。
                </div>
            </div>
            <a
                id="open-admin-panel-link"
                class="settings-admin-link"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
            >
                <span>打开 Admin 页面</span>
                <i class="bi bi-box-arrow-up-right" aria-hidden="true"></i>
            </a>
        </section>

        <div id="runtime-config-status" class="settings-status" role="status" aria-live="polite"></div>

        <div class="settings-actions">
            <button id="save-settings-btn" class="settings-btn primary" type="button">
                <i class="bi bi-check2" aria-hidden="true"></i>
                <span>保存</span>
            </button>
        </div>
    </section>

    <script src="js/config/app-env.js"></script>
    <script src="js/config/storage.js"></script>
    <script src="js/state/app-state.js"></script>
    <script src="js/ui/dom.js"></script>
    <script src="js/config/runtime-config.js"></script>
    <script src="js/ui/status-chip.js"></script>
    <script src="js/ui/subtitle.js"></script>
    <script src="js/platform/electron-bridge.js"></script>
    <script src="js/observer/capture.js"></script>
    <script src="js/observer/analyzer.js"></script>
    <script src="js/observer/observer-controller.js"></script>
    <script src="js/audio/recorder.js"></script>
    <script src="js/network/websocket.js"></script>
    <script src="js/ui/controls.js"></script>
    <script src="js/live2d/motions.js"></script>
    <script src="js/live2d/focus-tracking.js"></script>
    <script src="js/live2d/model.js"></script>
    <script src="js/audio/lip-sync.js"></script>
    <script src="js/audio/player.js"></script>
    <script src="js/config/runtime-bootstrap.js"></script>
    <script src="js/platform/electron-motion.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
